name: Deploy to GitHub Pages

on:
  push:
    branches: [main, integration]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site for GitHub Pages
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXTAUTH_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXTAUTH_SECRET: github-pages-static-build
          NEXT_PUBLIC_GOOGLE_OAUTH: "false"
          NEXT_PUBLIC_STEAM_OAUTH: "false"

      - name: Add .nojekyll for Next.js assets
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
